# Cada animal tiene 1 (cumple la caracteristica) o 0 (no la cumple)

caracteristicas:
  - Colorido
  - Cuadrupedo
  - Bigotes
  - Pequeno
  - Carrera
  - Construye
  - Largo
  - Gordito
  - Manchas
  - Aullido
  - Huevo
  - Salta

preguntas:
  Colorido:   "¿Tu animal tiene colores llamativos o vistosos?"
  Cuadrupedo: "¿Tu animal camina en cuatro patas?"
  Bigotes:    "¿Tu animal tiene bigotes o vibrisas largas?"
  Pequeno:    "¿Tu animal es pequeño (cabe en tus manos)?"
  Carrera:    "¿Tu animal es conocido por ser rapido o correr bien?"
  Construye:  "¿Tu animal construye algo (nido, madriguera, represa...)?"
  Largo:      "¿Tu animal tiene el cuerpo largo o alargado?"
  Gordito:    "¿Tu animal tiene cuerpo robusto o gordito?"
  Manchas:    "¿Tu animal tiene manchas o patrones en su piel o pelaje?"
  Aullido:    "¿Tu animal emite aullidos, ladridos o mugidos fuertes?"
  Huevo:      "¿Tu animal nace de un huevo?"
  Salta:      "¿Tu animal salta como forma de desplazamiento?"

