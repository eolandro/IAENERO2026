evaluacion_supervisor:
  - texto: Hola Ana, te envío el resumen de la reunión de hoy junto con el
      documento actualizado del proyecto. Revísalo cuando tengas tiempo y dime si
      falta agregar algún punto antes de compartirlo con el resto del equipo.
    spam_predicho: true
    spam_real: false
  - texto: ¡Felicidades! Tu cuenta ha sido seleccionada para recibir una
      recompensa especial por tu actividad reciente. Ingresa al siguiente enlace
      para confirmar tus datos y reclamar tu premio antes de que expire la
      promoción.
    spam_predicho: true
    spam_real: true
  - texto: Buenas noches profesor, le escribo para preguntarle si el laboratorio
      que dejamos pendiente la semana pasada se debe entregar en formato PDF o si
      lo revisaremos directamente durante la próxima clase.
    spam_predicho: false
    spam_real: false
  - texto: Obtén ingresos adicionales trabajando desde casa con nuestro programa
      exclusivo. No necesitas experiencia previa y puedes comenzar hoy mismo
      registrándote en nuestra plataforma.
    spam_predicho: true
    spam_real: true
  - texto:
      Hola Luis, solo quería confirmar si mañana seguimos con la reunión del
      proyecto a las diez de la mañana o si se cambió el horario como mencionaron
      en el chat del equipo.
    spam_predicho: true
    spam_real: false
  - texto: Tu cuenta presenta un intento de acceso no autorizado. Para evitar el
      bloqueo permanente del servicio es necesario verificar tu identidad
      inmediatamente en el siguiente enlace seguro.
    spam_predicho: true
    spam_real: true
  - texto: Te comparto las notas de la conferencia de ayer sobre análisis de
      datos. Creo que algunos ejemplos pueden servirnos para mejorar la parte
      metodológica de nuestro proyecto.
    spam_predicho: true
    spam_real: false
  - texto: Aprovecha esta oportunidad limitada para solicitar un préstamo rápido
      con aprobación inmediata. Completa el formulario en línea y recibe una
      respuesta en menos de diez minutos.
    spam_predicho: true
    spam_real: true
  - texto: Hola equipo, recuerden subir sus avances al repositorio antes de la
      reunión del viernes para que podamos revisar el progreso general del
      proyecto durante la sesión.
    spam_predicho: false
    spam_real: false
  - texto:
      Has sido elegido para participar en un programa exclusivo de inversión
      con ganancias garantizadas. Realiza tu registro hoy y comienza a generar
      ingresos sin riesgo.
    spam_predicho: true
    spam_real: true
